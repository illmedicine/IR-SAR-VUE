<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NIS SAR Viewer — Real-Time Satellite Tracker</title>
<link rel="stylesheet" href="css/style.css" />
<link rel="icon" href="data:," />
<!-- Three.js r149 (last release where examples/js/* attach to window.THREE as globals)
     + satellite.js via CDN. Pinned for stability. -->
<script src="https://cdn.jsdelivr.net/npm/three@0.149.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.149.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/satellite.js@5.0.0/dist/satellite.min.js"></script>
</head>
<body>
<div id="app">
    <canvas id="scene"></canvas>

    <!-- Header bar -->
    <header id="topbar">
        <div class="brand">
            <span class="logo">◉</span>
            <span class="title">NIS SAR Viewer</span>
            <span class="subtitle">Real-Time Orbital Tracker</span>
        </div>
        <div class="clock">
            <label><input type="checkbox" id="live" checked /> Live</label>
            <span id="utc">—</span>
            <label>Speed
                <select id="timerate">
                    <option value="1">1×</option>
                    <option value="10">10×</option>
                    <option value="60">60×</option>
                    <option value="600">600×</option>
                    <option value="3600">3600×</option>
                </select>
            </label>
        </div>
    </header>

    <!-- Left control panel -->
    <aside id="panel">
        <h2>Catalogs</h2>
        <div id="catalogs" class="catalogs"></div>

        <h2>Display</h2>
        <label class="row"><input type="checkbox" id="show-orbits" /> Show orbit paths</label>
        <label class="row"><input type="checkbox" id="show-labels" /> Show labels</label>
        <label class="row"><input type="checkbox" id="show-footprints" /> Show footprints</label>
        <label class="row">Point size
            <input type="range" id="point-size" min="1" max="8" step="0.5" value="3" />
        </label>

        <h2>Search</h2>
        <input type="text" id="search" placeholder="Search by name or NORAD ID…" />
        <div id="search-results"></div>

        <h2>Status</h2>
        <div id="status" class="status">Initializing…</div>
        <div class="small">Data: <a href="https://celestrak.org/" target="_blank" rel="noopener">CelesTrak</a> (TLE/SGP4)</div>
    </aside>

    <!-- Satellite info panel -->
    <aside id="info" class="hidden">
        <div class="info-header">
            <h3 id="info-name">—</h3>
            <button id="info-close" title="Close">×</button>
        </div>
        <div id="info-body"></div>
    </aside>

    <div id="hud-hint">Drag to rotate · Scroll to zoom · Click a satellite for details</div>
</div>

<script src="js/satellites.js"></script>
<script src="js/app.js"></script>
</body>
</html>
